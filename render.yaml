services:
  - type: web
    name: railman-ai
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: MONGODB_TRAINS_URI
        sync: false
      - key: MONGODB_TRAINS_DB
        value: railman_trains
      - key: MONGODB_CHAT_URI
        sync: false
      - key: MONGODB_CHAT_DB
        value: railman_chat
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 8000
